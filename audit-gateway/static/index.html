<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 审计网关管理平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f2f5;
            color: #333;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 500;
        }
        
        .header p {
            opacity: 0.9;
            margin-top: 5px;
            font-size: 14px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 40px;
        }
        
        .settings-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .settings-panel input {
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            width: 300px;
            margin-right: 10px;
        }
        
        .settings-panel button {
            padding: 8px 20px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .settings-panel button:hover {
            background: #40a9ff;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        
        .stat-card .label {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .stat-card .value {
            font-size: 32px;
            font-weight: 600;
            color: #1890ff;
        }
        
        .stat-card .sub-value {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        
        .card-header {
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 500;
        }
        
        .card-body {
            padding: 24px;
        }
        
        .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .filters input, .filters select {
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .filters button {
            padding: 8px 20px;
            background: #52c41a;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .filters button:hover {
            background: #73d13d;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        
        th {
            background: #fafafa;
            font-weight: 500;
            color: #666;
        }
        
        tr:hover {
            background: #f5f5f5;
        }
        
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .tag-openai { background: #e6f7ff; color: #1890ff; }
        .tag-claude { background: #f6ffed; color: #52c41a; }
        .tag-qwen { background: #fff7e6; color: #fa8c16; }
        .tag-azure { background: #f9f0ff; color: #722ed1; }
        .tag-baidu { background: #fff1f0; color: #f5222d; }
        
        .tag-risk-low { background: #f6ffed; color: #52c41a; }
        .tag-risk-medium { background: #fffbe6; color: #faad14; }
        .tag-risk-high { background: #fff1f0; color: #f5222d; }
        
        .pagination {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 20px;
        }
        
        .pagination button {
            padding: 6px 12px;
            border: 1px solid #d9d9d9;
            background: white;
            cursor: pointer;
            border-radius: 4px;
        }
        
        .pagination button:hover:not(:disabled) {
            border-color: #1890ff;
            color: #1890ff;
        }
        
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .pagination .active {
            background: #1890ff;
            color: white;
            border-color: #1890ff;
        }
        
        .chart-container {
            height: 300px;
            position: relative;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .error {
            background: #fff1f0;
            border: 1px solid #ffa39e;
            color: #cf1322;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .empty {
            text-align: center;
            padding: 60px;
            color: #999;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 8px;
            width: 80%;
            max-width: 800px;
            max-height: 80%;
            overflow: auto;
        }
        
        .modal-header {
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-body {
            padding: 24px;
        }
        
        .modal-close {
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .detail-row {
            margin-bottom: 16px;
        }
        
        .detail-label {
            font-weight: 500;
            color: #666;
            margin-bottom: 4px;
        }
        
        .detail-value {
            background: #f5f5f5;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow: auto;
        }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .tab:hover {
            color: #1890ff;
        }
        
        .tab.active {
            color: #1890ff;
            border-bottom-color: #1890ff;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛡️ AI 审计网关管理平台</h1>
        <p>监控和管理企业内部的 AI 模型调用行为</p>
    </div>
    
    <div class="container">
        <!-- 刷新按钮 -->
        <div style="text-align: right; margin-bottom: 15px;">
            <button onclick="loadDashboard(); loadLogs();" style="padding: 8px 20px; background: #52c41a; color: white; border: none; border-radius: 4px; cursor: pointer;">
                🔄 刷新数据
            </button>
        </div>
        
        <!-- 错误提示 -->
        <div id="errorMsg" class="error" style="display: none;"></div>
        
        <!-- Tab 导航 -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('dashboard')">📊 仪表盘</div>
            <div class="tab" onclick="switchTab('logs')">📝 审计日志</div>
            <div class="tab" onclick="switchTab('users')">👥 用户分析</div>
        </div>
        
        <!-- 仪表盘 -->
        <div id="dashboardTab" class="tab-content active">
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="label">总请求数</div>
                    <div class="value" id="totalRequests">-</div>
                    <div class="sub-value">最近24小时</div>
                </div>
                <div class="stat-card">
                    <div class="label">活跃用户</div>
                    <div class="value" id="uniqueUsers">-</div>
                    <div class="sub-value">去重用户数</div>
                </div>
                <div class="stat-card">
                    <div class="label">输入字符数</div>
                    <div class="value" id="totalChars">-</div>
                    <div class="sub-value">累计输入量</div>
                </div>
                <div class="stat-card">
                    <div class="label">预估成本</div>
                    <div class="value" id="estimatedCost">-</div>
                    <div class="sub-value">美元 (USD)</div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <span class="card-title">请求趋势（最近24小时）</span>
                </div>
                <div class="card-body">
                    <div class="chart-container" id="trendChart">
                        <canvas id="trendCanvas" width="800" height="300"></canvas>
                    </div>
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">按供应商分布</span>
                    </div>
                    <div class="card-body" id="providerStats">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">按部门分布</span>
                    </div>
                    <div class="card-body" id="deptStats">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 审计日志 -->
        <div id="logsTab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">审计日志查询</span>
                </div>
                <div class="card-body">
                    <div class="filters">
                        <input type="text" id="filterUserId" placeholder="用户ID">
                        <input type="text" id="filterDept" placeholder="部门">
                        <select id="filterProvider">
                            <option value="">所有供应商</option>
                            <option value="openai">OpenAI</option>
                            <option value="claude">Claude</option>
                            <option value="qwen">通义千问</option>
                            <option value="azure">Azure</option>
                        </select>
                        <select id="filterRisk">
                            <option value="">所有风险等级</option>
                            <option value="low">低风险</option>
                            <option value="medium">中风险</option>
                            <option value="high">高风险</option>
                        </select>
                        <input type="text" id="filterKeyword" placeholder="关键词搜索">
                        <button onclick="loadLogs()">查询</button>
                    </div>
                    
                    <table id="logsTable">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>用户</th>
                                <th>部门</th>
                                <th>供应商</th>
                                <th>模型</th>
                                <th>消息数</th>
                                <th>字符数</th>
                                <th>风险</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="logsTableBody">
                            <tr>
                                <td colspan="9" class="empty">请先保存设置并查询</td>
                            </tr>
                        </tbody>
                    </table>
                    
                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </div>
        
        <!-- 用户分析 -->
        <div id="usersTab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">活跃用户排行</span>
                </div>
                <div class="card-body">
                    <div class="filters">
                        <select id="userTimeRange">
                            <option value="1">最近1天</option>
                            <option value="7">最近7天</option>
                            <option value="30">最近30天</option>
                        </select>
                        <button onclick="loadTopUsers()">查询</button>
                    </div>
                    
                    <table id="usersTable">
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>用户ID</th>
                                <th>部门</th>
                                <th>请求数</th>
                                <th>输入字符</th>
                                <th>使用模型数</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr>
                                <td colspan="6" class="empty">点击查询加载数据</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 详情弹窗 -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>请求详情</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>
    
    <script>
        // ==================== 全局状态 ====================
        const state = {
            apiBase: '',  // 使用相对路径，自动适配当前域名
            currentPage: 1,
            pageSize: 20,
            totalItems: 0,
            dashboardData: null
        };
        
        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            // 页面加载时自动加载数据
            loadDashboard();
            loadLogs();
        });
        
        // ==================== 工具函数 ====================
        
        function showError(msg, type = 'error') {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            if (type === 'success') {
                el.style.background = '#f6ffed';
                el.style.borderColor = '#b7eb8f';
                el.style.color = '#52c41a';
            } else if (type === 'warning') {
                el.style.background = '#fffbe6';
                el.style.borderColor = '#ffe58f';
                el.style.color = '#faad14';
            } else {
                el.style.background = '#fff1f0';
                el.style.borderColor = '#ffa39e';
                el.style.color = '#cf1322';
            }
            setTimeout(() => el.style.display = 'none', 5000);
        }
        
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            // 处理直接调用和事件调用
            let target = event ? event.target : document.querySelector(`.tab[onclick*="${tabName}"]`);
            if (target) target.classList.add('active');
            
            document.getElementById(tabName + 'Tab').classList.add('active');
            
            if (tabName === 'users') {
                loadTopUsers();
            }
        }
        
        async function apiRequest(path, options = {}) {
            // 使用相对路径，自动适配当前域名
            const url = path;
            console.log('API Request:', url);
            
            try {
                const res = await fetch(url, {
                    ...options,
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    }
                });
                
                console.log('API Response:', res.status, res.statusText);
                
                if (!res.ok) {
                    const errText = await res.text();
                    console.error('API Error:', errText);
                    throw new Error(`HTTP ${res.status}: ${errText || res.statusText}`);
                }
                
                const data = await res.json();
                console.log('API Data:', data);
                return data;
            } catch (err) {
                console.error('Request failed:', err);
                throw err;
            }
        }
        
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN');
        }
        
        function getProviderTag(provider) {
            const map = {
                'openai': 'tag-openai',
                'claude': 'tag-claude',
                'qwen': 'tag-qwen',
                'azure': 'tag-azure',
                'baidu': 'tag-baidu'
            };
            const cls = map[provider] || '';
            return `<span class="tag ${cls}">${provider}</span>`;
        }
        
        function getRiskTag(level) {
            const map = {
                'low': 'tag-risk-low',
                'medium': 'tag-risk-medium',
                'high': 'tag-risk-high'
            };
            const label = { 'low': '低', 'medium': '中', 'high': '高' };
            const cls = map[level] || '';
            return `<span class="tag ${cls}">${label[level] || level}</span>`;
        }
        
        // ==================== 仪表盘 ====================
        async function loadDashboard() {
            
            try {
                const data = await apiRequest('/api/v1/stats/dashboard');
                state.dashboardData = data;
                
                // 检查是否有数据
                const hasData = data.summary && data.summary.total_requests > 0;
                
                if (!hasData) {
                    document.getElementById('providerStats').innerHTML = '<div class="empty">暂无数据，请检查数据是否已导入<br><br>提示：运行 docker-compose exec audit-gateway python generate_demo.py</div>';
                    document.getElementById('deptStats').innerHTML = '<div class="empty">暂无数据</div>';
                    document.getElementById('totalRequests').textContent = '0';
                    document.getElementById('uniqueUsers').textContent = '0';
                    document.getElementById('totalChars').textContent = '0';
                    document.getElementById('estimatedCost').textContent = '$0';
                    drawTrendChart([]);
                    showError('暂无数据，请导入演示数据', 'warning');
                    return;
                }
                
                // 更新统计卡片
                document.getElementById('totalRequests').textContent = formatNumber(data.summary.total_requests || 0);
                document.getElementById('uniqueUsers').textContent = formatNumber(data.summary.unique_users || 0);
                document.getElementById('totalChars').textContent = formatNumber(data.summary.total_input_chars || 0);
                document.getElementById('estimatedCost').textContent = '$' + (data.summary.estimated_cost_usd || 0);
                
                // 更新供应商分布
                const providerHtml = Object.entries(data.by_provider || {})
                    .map(([k, v]) => `
                        <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0;">
                            <span>${getProviderTag(k)}</span>
                            <span style="font-weight: 500;">${formatNumber(v)}</span>
                        </div>
                    `).join('');
                document.getElementById('providerStats').innerHTML = providerHtml || '<div class="empty">暂无数据</div>';
                
                // 更新部门分布
                const deptHtml = (data.by_department || [])
                    .slice(0, 10)
                    .map(d => `
                        <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0;">
                            <span>${d.department}</span>
                            <span>
                                <span style="font-weight: 500;">${formatNumber(d.requests)}</span>
                                <span style="color: #999; font-size: 12px;"> (${d.users}人)</span>
                            </span>
                        </div>
                    `).join('');
                document.getElementById('deptStats').innerHTML = deptHtml || '<div class="empty">暂无数据</div>';
                
                // 绘制趋势图
                drawTrendChart(data.time_series || []);
                
            } catch (err) {
                console.error('Dashboard error:', err);
                showError('加载仪表盘失败: ' + err.message);
            }
        }
        
        function drawTrendChart(data) {
            const canvas = document.getElementById('trendCanvas');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            
            ctx.clearRect(0, 0, width, height);
            
            if (!data || data.length === 0) return;
            
            // 简化版折线图
            const padding = 40;
            const chartWidth = width - padding * 2;
            const chartHeight = height - padding * 2;
            
            const maxValue = Math.max(...data.map(d => d.requests));
            const stepX = chartWidth / (data.length - 1 || 1);
            
            // 绘制网格
            ctx.strokeStyle = '#f0f0f0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padding + chartHeight * i / 5;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(width - padding, y);
                ctx.stroke();
            }
            
            // 绘制折线
            ctx.strokeStyle = '#1890ff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            
            data.forEach((point, index) => {
                const x = padding + index * stepX;
                const y = padding + chartHeight * (1 - point.requests / maxValue);
                
                if (index === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            
            ctx.stroke();
            
            // 绘制点
            ctx.fillStyle = '#1890ff';
            data.forEach((point, index) => {
                const x = padding + index * stepX;
                const y = padding + chartHeight * (1 - point.requests / maxValue);
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // 标签
            ctx.fillStyle = '#666';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            
            // X轴标签（每4小时显示一个）
            data.forEach((point, index) => {
                if (index % 4 === 0) {
                    const x = padding + index * stepX;
                    const hour = new Date(point.hour).getHours();
                    ctx.fillText(hour + ':00', x, height - 10);
                }
            });
        }
        
        // ==================== 审计日志 ====================
        async function loadLogs(page = 1) {
            state.currentPage = page;
            
            const params = new URLSearchParams();
            params.set('page', page);
            params.set('page_size', state.pageSize);
            
            const userId = document.getElementById('filterUserId').value;
            const dept = document.getElementById('filterDept').value;
            const provider = document.getElementById('filterProvider').value;
            const risk = document.getElementById('filterRisk').value;
            const keyword = document.getElementById('filterKeyword').value;
            
            if (userId) params.set('user_id', userId);
            if (dept) params.set('department', dept);
            if (provider) params.set('provider', provider);
            if (risk) params.set('risk_level', risk);
            if (keyword) params.set('keyword', keyword);
            
            try {
                const data = await apiRequest(`/api/v1/admin/logs?${params}`);
                
                const tbody = document.getElementById('logsTableBody');
                
                if (data.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" class="empty">暂无数据</td></tr>';
                    return;
                }
                
                tbody.innerHTML = data.data.map(item => `
                    <tr>
                        <td>${formatTime(item.timestamp)}</td>
                        <td>${item.user_id}</td>
                        <td>${item.department}</td>
                        <td>${getProviderTag(item.provider)}</td>
                        <td>${item.model}</td>
                        <td>${item.message_count}</td>
                        <td>${formatNumber(item.total_chars)}</td>
                        <td>${getRiskTag(item.risk_level)}</td>
                        <td>
                            <button onclick="showDetail('${item.request_id}')" style="padding: 4px 12px; background: #1890ff; color: white; border: none; border-radius: 4px; cursor: pointer;">详情</button>
                        </td>
                    </tr>
                `).join('');
                
                // 分页
                state.totalItems = data.pagination.total;
                renderPagination(data.pagination);
                
            } catch (err) {
                showError('加载日志失败: ' + err.message);
            }
        }
        
        function renderPagination(pagination) {
            const totalPages = pagination.total_pages;
            const current = pagination.page;
            
            let html = '';
            
            // 上一页
            html += `<button onclick="loadLogs(${current - 1})" ${current === 1 ? 'disabled' : ''}>上一页</button>`;
            
            // 页码
            const startPage = Math.max(1, current - 2);
            const endPage = Math.min(totalPages, current + 2);
            
            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="${i === current ? 'active' : ''}" onclick="loadLogs(${i})">${i}</button>`;
            }
            
            // 下一页
            html += `<button onclick="loadLogs(${current + 1})" ${current === totalPages ? 'disabled' : ''}>下一页</button>`;
            
            html += `<span style="margin-left: 10px; color: #666;">共 ${pagination.total} 条</span>`;
            
            document.getElementById('pagination').innerHTML = html;
        }
        
        function showDetail(requestId) {
            // 从当前数据中找到详情
            const item = state.dashboardData?.data?.find(d => d.request_id === requestId);
            
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="detail-row">
                    <div class="detail-label">请求 ID</div>
                    <div class="detail-value">${requestId}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">内容预览</div>
                    <div class="detail-value">${item?.contents_preview || 'N/A'}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">客户端 IP</div>
                    <div class="detail-value">${item?.client_ip || 'N/A'}</div>
                </div>
            `;
            
            document.getElementById('detailModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }
        
        // ==================== 用户分析 ====================
        async function loadTopUsers() {
            const days = document.getElementById('userTimeRange').value;
            
            try {
                const end = new Date().toISOString();
                const start = new Date(Date.now() - days * 24 * 60 * 60 * 1000).toISOString();
                
                const data = await apiRequest(`/api/v1/stats/users/top?limit=20`);
                
                const tbody = document.getElementById('usersTableBody');
                
                if (!data.users || data.users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty">暂无数据</td></tr>';
                    return;
                }
                
                tbody.innerHTML = data.users.map((user, index) => `
                    <tr>
                        <td><strong style="color: ${index < 3 ? '#fa8c16' : '#666'};">#${index + 1}</strong></td>
                        <td>${user.user_id}</td>
                        <td>${user.department}</td>
                        <td>${formatNumber(user.requests)}</td>
                        <td>${formatNumber(user.input_chars)}</td>
                        <td>${user.models_used}</td>
                    </tr>
                `).join('');
                
            } catch (err) {
                showError('加载用户排行失败: ' + err.message);
            }
        }
        
        // 点击弹窗外部关闭
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
